repo = "/absolute/path/to/your/repo"
default_branch = "main"
worktree = true

setup    = "scripts/init.sh"
teardown = "scripts/cleanup.sh"

layout_file = "tmux/dev-layout.tmux"

[[windows]]
name = "agent"
focus = true

  [[windows.panes]]
  run = "codex --model gpt-5.3-codex"
  agent = true

[[windows]]
name = "ops"

  [[windows.panes]]
  cwd = "."
  run = "git status -sb"

  [[windows.panes]]
  split = "vertical"
  size = "30%"
  cwd = "."
  run = "make test"
